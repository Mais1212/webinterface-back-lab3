<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрационная форма</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #e0e0e0;
        }

        .form-container {
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 30px;
            font-size: 28px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #d0d0d0;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="tel"],
        input[type="email"],
        input[type="date"],
        textarea,
        select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(50, 50, 50, 0.8);
            border: 2px solid rgba(100, 100, 100, 0.3);
            border-radius: 12px;
            color: #e0e0e0;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #4a90e2;
            background: rgba(60, 60, 60, 0.9);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        input::placeholder,
        textarea::placeholder {
            color: #888;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
        }

        .radio-group,
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .radio-item,
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .radio-item:hover,
        .checkbox-item:hover {
            background: rgba(100, 100, 100, 0.2);
        }

        input[type="radio"],
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #4a90e2;
        }

        .select-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            max-height: 150px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(50, 50, 50, 0.8);
            border-radius: 12px;
            border: 2px solid rgba(100, 100, 100, 0.3);
        }

        .select-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .select-item:hover {
            background: rgba(74, 144, 226, 0.2);
            color: #ffffff;
        }

        .select-item input[type="checkbox"]:checked + span {
            color: #4a90e2;
            font-weight: 600;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(74, 144, 226, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        @media (max-width: 480px) {
            .form-container {
                padding: 30px 20px;
                margin: 10px;
            }
            
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Регистрационная форма</h1>
        
        <form id="userForm">
            <div class="form-group">
                <label for="fullName">ФИО *</label>
                <input type="text" id="fullName" name="fullName" required placeholder="Введите ваше ФИО">
            </div>

            <div class="form-group">
                <label for="phone">Телефон *</label>
                <input type="tel" id="phone" name="phone" required placeholder="+7 (999) 123-45-67">
            </div>

            <div class="form-group">
                <label for="email">E-mail *</label>
                <input type="email" id="email" name="email" required placeholder="example@mail.ru">
            </div>

            <div class="form-group">
                <label for="birthDate">Дата рождения *</label>
                <input type="date" id="birthDate" name="birthDate" required>
            </div>

            <div class="form-group">
                <label>Пол *</label>
                <div class="radio-group">
                    <div class="radio-item">
                        <input type="radio" id="male" name="gender" value="male" required>
                        <label for="male">Мужской</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="female" name="gender" value="female" required>
                        <label for="female">Женский</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Любимый язык программирования (выберите несколько)</label>
                <div class="select-group">
                    <div class="select-item">
                        <input type="checkbox" id="pascal" name="languages" value="Pascal">
                        <span>Pascal</span>
                    </div>
                    <div class="select-item">
                        <input type="checkbox" id="c" name="languages" value="C">
                        <span>C</span>
                    </div>
                    <div class="select-item">
                        <input type="checkbox" id="cpp" name="languages" value="C++">
                        <span>C++</span>
                    </div>
                    <div class="select-item">
                        <input type="checkbox" id="js" name="languages" value="JavaScript">
                        <span>JavaScript</span>
                    </div>
                    <div class="select-item">
                        <input type="checkbox" id="php" name="languages" value="PHP">
                        <span>PHP</span>
                    </div>
                    <div class="select-item">
                        <input type="checkbox" id="python" name="languages" value="Python">
                        <span>Python</span>
                    </div>
                    <div class="select-item">
                        <input type="checkbox" id="java" name="languages" value="Java">
                        <span>Java</span>
                    </div>
                    <div class="select-item">
                        <input type="checkbox" id="haskell" name="languages" value="Haskell">
                        <span>Haskell</span>
                    </div>
                    <div class="select-item">
                        <input type="checkbox" id="clojure" name="languages" value="Clojure">
                        <span>Clojure</span>
                    </div>
                    <div class="select-item">
                        <input type="checkbox" id="prolog" name="languages" value="Prolog">
                        <span>Prolog</span>
                    </div>
                    <div class="select-item">
                        <input type="checkbox" id="scala" name="languages" value="Scala">
                        <span>Scala</span>
                    </div>
                    <div class="select-item">
                        <input type="checkbox" id="go" name="languages" value="Go">
                        <span>Go</span>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="bio">Биография</label>
                <textarea id="bio" name="bio" placeholder="Расскажите о себе..."></textarea>
            </div>

            <div class="form-group">
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="contract" name="contract" required>
                        <label for="contract">С контрактом ознакомлен(а)</label>
                    </div>
                </div>
            </div>

            <button type="submit">Сохранить</button>
        </form>
    </div>

    <script>
        document.getElementById('userForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Форма успешно отправлена! (Это демонстрация)');
        });

        // Установка текущей даты как максимальной для поля даты рождения
        document.getElementById('birthDate').max = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
