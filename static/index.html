<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрационная форма</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img src="gif.gif" style="position: fixed; opacity: 70%; top: 90%; right: 10px; width: 100px; height: auto;">
    <div class="form-container">
        <h1>Регистрационная форма <br>Шопена Е.</h1>
        
        <form id="userForm" action="/submit" method="POST">
            <div class="form-group">
                <label for="fullName">ФИО *</label>
                <input type="text" id="fullName" name="fullName" required placeholder="Введите ваше ФИО">
            </div>

            <div class="form-group">
                <label for="phone">Телефон *</label>
                <input type="tel" id="phone" name="phone" required placeholder="+7 (999) 123-45-67">
            </div>

            <div class="form-group">
                <label for="email">E-mail *</label>
                <input type="email" id="email" name="email" required placeholder="example@mail.ru">
            </div>

            <div class="form-group">
                <label for="birthDate">Дата рождения *</label>
                <input type="date" id="birthDate" name="birthDate" required>
            </div>

            <div class="form-group">
                <label>Пол *</label>
                <div class="radio-group">
                    <div class="radio-item">
                        <input type="radio" id="male" name="gender" value="male" required>
                        <label for="male">Мужской</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="female" name="gender" value="female" required>
                        <label for="female">Женский</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Любимый язык программирования (выберите несколько)</label>
                <div class="select-group">
                    <div class="select-item">
                        <input type="checkbox" id="pascal" name="languages" value="Pascal">
                        <span>Pascal</span>
                    </div>
                    <div class="select-item">
                        <input type="checkbox" id="c" name="languages" value="C">
                        <span>C</span>
                    </div>
                    <div class="select-item">
                        <input type="checkbox" id="cpp" name="languages" value="C++">
                        <span>C++</span>
                    </div>
                    <div class="select-item">
                        <input type="checkbox" id="js" name="languages" value="JavaScript">
                        <span>JavaScript</span>
                    </div>
                    <div class="select-item">
                        <input type="checkbox" id="php" name="languages" value="PHP">
                        <span>PHP</span>
                    </div>
                    <div class="select-item">
                        <input type="checkbox" id="python" name="languages" value="Python">
                        <span>Python</span>
                    </div>
                    <div class="select-item">
                        <input type="checkbox" id="java" name="languages" value="Java">
                        <span>Java</span>
                    </div>
                    <div class="select-item">
                        <input type="checkbox" id="haskell" name="languages" value="Haskell">
                        <span>Haskell</span>
                    </div>
                    <div class="select-item">
                        <input type="checkbox" id="clojure" name="languages" value="Clojure">
                        <span>Clojure</span>
                    </div>
                    <div class="select-item">
                        <input type="checkbox" id="prolog" name="languages" value="Prolog">
                        <span>Prolog</span>
                    </div>
                    <div class="select-item">
                        <input type="checkbox" id="scala" name="languages" value="Scala">
                        <span>Scala</span>
                    </div>
                    <div class="select-item">
                        <input type="checkbox" id="go" name="languages" value="Go">
                        <span>Go</span>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="bio">Биография</label>
                <textarea id="bio" name="bio" placeholder="Расскажите о себе..."></textarea>
            </div>

            <div class="form-group">
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="contract" name="contract" required>
                        <label for="contract">С контрактом ознакомлен(а)</label>
                    </div>
                </div>
            </div>

            <button type="submit" value="submit">Сохранить</button>
        </form>
    </div>
</body>
</html>
